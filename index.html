<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator ver3</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #controls {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 350px;
        }

        #taskInput {
            grid-column: 1 / -1;
            padding: 20px;
            font-size: 1.8rem;
            text-align: right;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 15px;
            background: #f5f5f5;
            color: #333;
            font-weight: bold;
            width: calc(100% - 40px); 
        }

        .btn {
            padding: 20px;
            font-size: 1.4rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(145deg, #f0f0f0, #cacaca);
            color: #333;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.4s ease;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.15);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 10px rgba(0,0,0,0.25);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        #plus, #minus, #multiply, #divide {
            background: linear-gradient(145deg, #FF9A56, #FF6B35);
            color: white;
        }

        #equals {
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
            grid-column: span 2;
        }

        #clear {
            background: linear-gradient(145deg, #f44336, #da190b);
            color: white;
            grid-column: span 2;
        }

        #dot {
            background: linear-gradient(145deg, #d4a661, #de8657);
            color: white;
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <h1>Calculator</h1>

    <div id="controls">
        <input id="taskInput" readonly placeholder="0">
        <button class="btn" id="one">1</button>
        <button class="btn" id="two">2</button>
        <button class="btn" id="three">3</button>
        <button class="btn" id="four">4</button>
        <button class="btn" id="five">5</button>
        <button class="btn" id="six">6</button>
        <button class="btn" id="seven">7</button>
        <button class="btn" id="eight">8</button>
        <button class="btn" id="nine">9</button>
        <button class="btn" id="zero">0</button>
        <button class="btn" id="plus">+</button>
        <button class="btn" id="minus">-</button>
        <button class="btn" id="multiply">*</button>
        <button class="btn" id="divide">/</button>
        <button class="btn" id="equals">=</button>
        <button class="btn" id="clear">C</button>
        <button class="btn" id="dot">.</button>
    </div>

    <script>
let display = ""
const buttons = document.querySelectorAll('.btn')
buttons.forEach(function(button){
  button.addEventListener("click", function(){

  if (button.textContent === "C") {
    document.getElementById("taskInput").value = ""
    display = "" }
  else if (button.textContent === "=") {
    display = eval(display).toString();
    document.getElementById("taskInput").value = display
  }
  else {
    display += button.textContent
    document.getElementById("taskInput").value = display
}
  })
})
    </script>

</body>
</html>
